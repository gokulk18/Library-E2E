apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: chapterone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: chapterone/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: MONGO_URI
              value: mongodb://mongo:27017/chapterone_users
            - name: JWT_SECRET
              value: chapterone-super-secret-jwt-key-change-in-production-256bits
          readinessProbe:
            httpGet:
              path: /api-docs
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api-docs
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
