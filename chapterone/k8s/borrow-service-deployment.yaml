apiVersion: apps/v1
kind: Deployment
metadata:
  name: borrow-service
  namespace: chapterone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: borrow-service
  template:
    metadata:
      labels:
        app: borrow-service
    spec:
      containers:
        - name: borrow-service
          image: chapterone/borrow-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: MONGO_URI
              value: mongodb://mongo:27017/chapterone_borrows
            - name: BOOK_SERVICE_URL
              value: http://book-service:8081
          readinessProbe:
            httpGet:
              path: /api-docs
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api-docs
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
