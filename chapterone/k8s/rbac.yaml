apiVersion: v1
kind: ServiceAccount
metadata:
  name: chapterone-sa
  namespace: chapterone
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chapterone-role
  namespace: chapterone
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chapterone-rolebinding
  namespace: chapterone
subjects:
  - kind: ServiceAccount
    name: chapterone-sa
    namespace: chapterone
roleRef:
  kind: Role
  name: chapterone-role
  apiGroup: rbac.authorization.k8s.io
